# ╔══════════════════════════════════════════════════════════════╗
# ║                  HYPRLAND CONFIGURATION                      ║
# ║         Auto-managed by NixOS — edit via flake repo          ║
# ╚══════════════════════════════════════════════════════════════╝

# ==========================================
# MONITORS
# ==========================================
# Auto-detect all connected monitors with preferred resolution.
# To configure manually (resolution, Hz, scale, position), use:
#   nwg-displays          — GUI tool (SUPER+Shift+M)
#   wlr-randr             — CLI tool
#   hyprctl monitors      — show current monitor info
#
# Manual example (uncomment and edit):
#   monitor=eDP-1,1920x1200@60,0x0,1
#   monitor=HDMI-A-1,2560x1440@144,1920x0,1
#   monitor=DP-1,2560x1440@165,1920x0,1.25
#
# Format: monitor=name,resolution@refreshRate,position,scale
#   refreshRate — in Hz (e.g. 60, 144, 165)
#   position    — e.g. 0x0 (top-left), 1920x0 (right of first monitor)
#   scale       — 1 = native, 1.25/1.5/2 = HiDPI scaling

# Load monitor configuration from nwg-displays (written to monitors.conf on Apply)
# source = ~/.config/hypr/monitors.conf

# Fallback: auto-detect any unconfigured monitors with preferred resolution
monitor=,preferred,auto,1

# ==========================================
# PROGRAMS
# ==========================================
$terminal = kitty
$menu = rofi -show drun
$browser = google-chrome-stable
$fileManager = nautilus
$editor = code

# ==========================================
# AUTOSTART
# ==========================================
exec-once = waybar
exec-once = dunst
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = blueman-applet
exec-once = nm-applet --indicator
# exec-once = kanshi    # DISABLED: conflicts with nwg-displays — kanshi overrides monitor layout on hotplug

# ==========================================
# ENVIRONMENT VARIABLES
# ==========================================
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# ==========================================
# INPUT — KEYBOARD & TOUCHPAD
# ==========================================
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:ctrl_space_toggle
    kb_rules =

    follow_mouse = 1

    # MacBook-like cursor feel:
    # 0.0 = no accel, 1.0 = max accel. 0.15 = calm, precise, not jumpy
    sensitivity = 0.15

    repeat_rate = 50    # Key repeats per second (default 25)
    repeat_delay = 200  # ms before repeat starts (default 600)

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        tap-and-drag = true            # Tap then drag without holding finger down (macOS-like)
        drag_lock = false              # Don't lock drag after release (macOS doesn't do this)
        clickfinger_behavior = true    # 2-finger tap = right click, 3-finger = middle (no emulation area)
        scroll_factor = 0.5           # Reduced for smooth, non-jerky two-finger scrolling (was 1.0→0.8→0.5)
    }
}

# ==========================================
# GESTURES
# ==========================================
# gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
#     workspace_swipe_distance = 200        # Lower = more responsive (macOS feels instant)
#     workspace_swipe_invert = false        # Natural swipe direction (matches macOS)
#     workspace_swipe_min_speed_to_force = 15  # Lower threshold = faster commit
#     workspace_swipe_cancel_ratio = 0.3    # Less likely to cancel mid-swipe
#     workspace_swipe_create_new = true
#     workspace_swipe_forever = true        # Wrap around last↔first workspace (macOS-like)
# }

# ==========================================
# GESTURES — Touchpad (4-finger)
# ==========================================
# 4-finger swipe up → expo overview (Mission Control) — handled by hyprexpo plugin
# 3-finger swipe left/right → switch workspaces — handled by Hyprland native gestures

# ==========================================
# COLOR SCHEME — Catppuccin Mocha
# ==========================================
# Rosewater #f5e0dc  Flamingo  #f2cdcd  Pink     #f5c2e7
# Mauve      #cba6f7  Red       #f38ba8  Maroon   #eba0ac
# Peach      #fab387  Yellow    #f9e2af  Green    #a6e3a1
# Teal       #94e2d5  Sky       #89dceb  Sapphire #74c7ec
# Blue       #89b4fa  Lavender  #b4befe  Text     #cdd6f4
# Subtext1   #bac2de  Subtext0  #a6adc8  Overlay2 #9399b2
# Overlay1   #7f849c  Overlay0  #6c7086  Surface2 #585b70
# Surface1   #45475a  Surface0  #313244  Base     #1e1e2e
# Mantle     #181825  Crust     #11111b

$rosewater = rgba(f5e0dcff)
$flamingo  = rgba(f2cdcdff)
$pink      = rgba(f5c2e7ff)
$mauve     = rgba(cba6f7ff)
$red       = rgba(f38ba8ff)
$maroon    = rgba(eba0acff)
$peach     = rgba(fab387ff)
$yellow    = rgba(f9e2afff)
$green     = rgba(a6e3a1ff)
$teal      = rgba(94e2d5ff)
$sky       = rgba(89dcebff)
$sapphire  = rgba(74c7ecff)
$blue      = rgba(89b4faff)
$lavender  = rgba(b4bebeff)
$text      = rgba(cdd6f4ff)
$subtext1  = rgba(bac2deff)
$subtext0  = rgba(a6adc8ff)
$overlay2  = rgba(9399b2ff)
$overlay1  = rgba(7f849cff)
$overlay0  = rgba(6c7086ff)
$surface2  = rgba(585b70ff)
$surface1  = rgba(45475aff)
$surface0  = rgba(313244ff)
$base      = rgba(1e1e2eff)
$mantle    = rgba(181825ff)
$crust     = rgba(11111bff)

# ==========================================
# GENERAL — LAYOUT & ANIMATIONS
# ==========================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $mauve $pink 45deg
    col.inactive_border = $surface0
    layout = dwindle

    resize_on_border = true
    hover_icon_on_border = true
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }

    dim_inactive = false
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true  # master switch for pseudotiling
    preserve_split = true  # you probably want this
}

# ==========================================
# MISCELLANEOUS
# ==========================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
}

# ╔══════════════════════════════════════════════════════════════╗
# ║                      KEYBINDINGS                             ║
# ╚══════════════════════════════════════════════════════════════╝

$mainMod = SUPER

# ---------- Essential ----------
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, pseudo,  # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# ---------- App shortcuts ----------
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, C, exec, $editor
bind = $mainMod SHIFT, M, exec, nwg-displays    # Monitor settings GUI (resolution, Hz, scale, position)

# ---------- Focus movement (vim-like) ----------
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# ---------- Quick window switching ----------
bind = ALT, Tab, focuscurrentorlast                    # Alt+Tab — toggle between current and last window (cross-monitor)
bind = ALT SHIFT, Tab, cyclenext, prev                 # Alt+Shift+Tab — cycle windows backward within workspace
bind = $mainMod, Tab, focuscurrentorlast               # Win+Tab — flip to last focused window
bind = $mainMod, grave, exec, rofi -show window        # Win+` — rofi window picker (grave = backtick)

# ---------- Switch workspaces with arrows (macOS-like) ----------
bind = $mainMod, left, workspace, e-1
bind = $mainMod, right, workspace, e+1


# ---------- Move windows with arrows ----------
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ---------- Resize windows ----------
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# ---------- Workspaces (1-5) ----------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ---------- Move window to workspace ----------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ---------- Scroll through workspaces ----------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ---------- Mouse bindings ----------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ---------- Media keys ----------
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t

# ---------- Brightness ----------
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# ---------- Screenshots ----------
# Print — full screenshot → save + clipboard + notification
bind = , Print, exec, grim - | tee ~/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S.png') | wl-copy && notify-send '📸 Screenshot' 'Full screen saved & copied' -i applets-screenshooter

# SUPER+Print — area screenshot → save + clipboard + notification
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | tee ~/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S.png') | wl-copy && notify-send '📸 Screenshot' 'Area saved & copied' -i applets-screenshooter

# SUPER+SHIFT+Print — area screenshot with annotation editor (swappy)
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -

# ALT+Print — active window screenshot → save + clipboard + notification
bind = ALT, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0],\(.at[1]) \(.size[0])x\(.size[1])"')" - | tee ~/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S.png') | wl-copy && notify-send '📸 Screenshot' 'Active window saved & copied' -i applets-screenshooter

# ---------- Screen recording ----------
# SUPER+SHIFT+R — record selected area (wf-recorder)
bind = $mainMod SHIFT, R, exec, wf-recorder -g "$(slurp)" -f ~/Recordings/$(date +'%Y-%m-%d_%H-%M-%S.mp4') & notify-send 'Recording' 'Screen recording started' -i media-record

# SUPER+SHIFT+ALT+R — stop recording
bind = $mainMod SHIFT ALT, R, exec, killall -SIGINT wf-recorder && notify-send 'Recording' 'Screen recording saved' -i media-playback-stop

# ---------- Clipboard history ----------
bind = $mainMod, comma, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ---------- macOS Mission Control (workspace overview) ----------
# bind = $mainMod, up, hyprexpo:expo, toggle                            # SUPER+Up — toggle workspace overview
# bind = $mainMod, down, hyprexpo:expo, toggle                          # SUPER+Down — toggle (close) workspace overview

# ╔══════════════════════════════════════════════════════════════╗
# ║                     WINDOW RULES                             ║
# ╚══════════════════════════════════════════════════════════════╝

# Float specific windows
windowrulev = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev = float, class:^(pavucontrol)$
windowrulev = float, class:^(nm-connection-editor)$
windowrulev = float, class:^(blueman-manager)$
windowrulev = float, class:^(xdg-desktop-portal-gtk)$
windowrulev = float, class:^(nwg-displays)$
windowrulev = size 70% 80%, class:^(nwg-displays)$

# File manager & viewers floating by default
windowrulev = float, class:^(nautilus)$
windowrulev = float, class:^(org.gnome.Loupe)$
windowrulev = float, class:^(org.gnome.Evince)$
windowrulev = size 80% 85%, class:^(org.gnome.Evince)$
windowrulev = size 80% 85%, class:^(org.gnome.Loupe)$

# mpv — floating & pinned for video playback, centered
windowrulev = float, class:^(mpv)$
windowrulev = size 70% 80%, class:^(mpv)$
windowrulev = center, class:^(mpv)$

# Picture-in-Picture
windowrulev = float, class:^(firefox)$, title:^(Picture-in-Picture)$
windowrulev = pin, class:^(firefox)$, title:^(Picture-in-Picture)$
windowrulev = float, class:^(google-chrome)$, title:^(Picture-in-Picture)$
windowrulev = pin, class:^(google-chrome)$, title:^(Picture-in-Picture)$

# VS Code - no dimming when unfocused
windowrulev = noblur, class:^(code)$
windowrulev = noblur, class:^(google-chrome)$

