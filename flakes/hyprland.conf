# ╔══════════════════════════════════════════════════════════════╗
# ║                  HYPRLAND CONFIGURATION                      ║
# ║         Auto-managed by NixOS — edit via flake repo          ║
# ╚══════════════════════════════════════════════════════════════╝

# ==========================================
# MONITORS
# ==========================================
# Auto-detect monitors (works for most laptops)
monitor=,preferred,auto,1

# ==========================================
# PROGRAMS
# ==========================================
$terminal = kitty
$menu = rofi -show drun
$browser = google-chrome-stable
$fileManager = nautilus
$editor = code

# ==========================================
# AUTOSTART
# ==========================================
exec-once = waybar
exec-once = dunst
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = blueman-applet
exec-once = nm-applet --indicator

# ==========================================
# ENVIRONMENT VARIABLES
# ==========================================
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# ==========================================
# INPUT — KEYBOARD & TOUCHPAD
# ==========================================
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0  # 0 = no change, -1.0 to 1.0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        drag_lock = false
        scroll_factor = 1.0
    }
}

# ==========================================
# GESTURES
# ==========================================
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_forever = false
}

# ==========================================
# GENERAL — LAYOUT & ANIMATIONS
# ==========================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle

    resize_on_border = true
    hover_icon_on_border = true
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }

    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)

    dim_inactive = false
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true  # master switch for pseudotiling
    preserve_split = true  # you probably want this
    no_gaps_when_only = false
}

master {
    new_is_master = true
}

# ==========================================
# MISCELLANEOUS
# ==========================================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
}

# ╔══════════════════════════════════════════════════════════════╗
# ║                      KEYBINDINGS                             ║
# ╚══════════════════════════════════════════════════════════════╝

$mainMod = SUPER

# ---------- Essential ----------
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, pseudo,  # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# ---------- App shortcuts ----------
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, C, exec, $editor

# ---------- Focus movement (vim-like) ----------
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# ---------- Move windows with arrows ----------
bind = $mainMod, left, movewindow, l
bind = $mainMod, right, movewindow, r
bind = $mainMod, up, movewindow, u
bind = $mainMod, down, movewindow, d

# ---------- Resize windows ----------
bind = $mainMod CTRL, left, resizeactive, -30 0
bind = $mainMod CTRL, right, resizeactive, 30 0
bind = $mainMod CTRL, up, resizeactive, 0 -30
bind = $mainMod CTRL, down, resizeactive, 0 30

# ---------- Workspaces (1-5) ----------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ---------- Move window to workspace ----------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ---------- Scroll through workspaces ----------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ---------- Mouse bindings ----------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ---------- Media keys ----------
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t

# ---------- Brightness ----------
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# ---------- Screenshots ----------
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim - | wl-copy
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" ~/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S.png')

# ---------- Clipboard history ----------
bind = $mainMod, comma, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ╔══════════════════════════════════════════════════════════════╗
# ║                     WINDOW RULES                             ║
# ╚══════════════════════════════════════════════════════════════╝

# Float specific windows
windowrule = float, ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(nm-connection-editor)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(xdg-desktop-portal-gtk)$

# File manager floating by default
windowrule = float, ^(nautilus)$

# Picture-in-Picture
windowrule = float, ^(firefox)$, title:^(Picture-in-Picture)$
windowrule = pin, ^(firefox)$, title:^(Picture-in-Picture)$
windowrule = float, ^(google-chrome)$, title:^(Picture-in-Picture)$
windowrule = pin, ^(google-chrome)$, title:^(Picture-in-Picture)$

# VS Code - no dimming when unfocused
windowrule = noblur, ^(code)$
windowrule = noblur, ^(google-chrome)$